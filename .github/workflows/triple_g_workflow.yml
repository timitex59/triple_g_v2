name: Triple G Indicators Scan

on:
  schedule:
    - cron: "15 4-22 * * 1-5" # Du lundi au vendredi, de 4h15 à 22h15 UTC
    # TEST JOUR : Toutes les heures à la minute 10
    #- cron: "10 * * * *"
  workflow_dispatch: # Permet le lancement manuel

permissions:
  contents: write # Important pour pouvoir pusher les changements de runner_history.json

concurrency:
  group: triple-g-state-updates
  cancel-in-progress: false

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # - name: Download market cache
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: market-cache
      #     path: .
      #   continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip" # Cache les dépendances pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify dependency consistency
        run: |
          python -m pip check

      - name: Validate critical imports
        run: |
          python -c "import websocket; print('websocket import OK')"

      - name: Run Triple G Indicators Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REVERSAL_TZ: Europe/Paris
          ENABLE_TELEGRAM_BREAK_LINE: "false"
          ENABLE_TELEGRAM_ICHIMOKU: "false"
          ENABLE_TELEGRAM_CONSOLIDATION: "false"
          ENABLE_TELEGRAM_BREAK_LINE_RENKO: "false"
          ENABLE_TELEGRAM_HEIKEN: "false"
          ENABLE_TELEGRAM_PX_RENKO_V4: "false"
          ENABLE_TELEGRAM_PX_RENKO_INDEX: "true"
          ENABLE_TELEGRAM_TRACKER: "false"
        run: |
          HOUR_MIN_PARIS=$(TZ="$REVERSAL_TZ" date +%H%M)
          export TG_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
          export TG_CHAT_ID="$TELEGRAM_CHAT_ID"

          run_with_telegram() {
            ENABLE_FLAG="$1"
            shift
            if [ "$ENABLE_FLAG" = "true" ]; then
              TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python "$@"
            else
              TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python "$@"
            fi
          }

          if [ "$ENABLE_TELEGRAM_PX_RENKO_INDEX" = "true" ]; then
            TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python px_renko_screener_index.py
          else
            TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python px_renko_screener_index.py --no-telegram
          fi

          run_with_telegram "$ENABLE_TELEGRAM_PX_RENKO_INDEX" px_renko_index_tracker.py

          run_with_telegram "$ENABLE_TELEGRAM_BREAK_LINE" break_line.py
          run_with_telegram "$ENABLE_TELEGRAM_ICHIMOKU" ichimoku_v4.py
          run_with_telegram "$ENABLE_TELEGRAM_CONSOLIDATION" triple_g_consolidation.py

          if [ "$ENABLE_TELEGRAM_BREAK_LINE_RENKO" = "true" ]; then
            TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python break_line_renko_strategy.py --telegram
          else
            TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python break_line_renko_strategy.py
          fi

          if [ "$ENABLE_TELEGRAM_HEIKEN" = "true" ]; then
            TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python heiken_ashi_aligned_v2.py
          else
            TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python heiken_ashi_aligned_v2.py --no-telegram
          fi

          if [ "$ENABLE_TELEGRAM_PX_RENKO_V4" = "true" ]; then
            TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python px_renko_screener_v4.py
          else
            TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python px_renko_screener_v4.py --no-telegram
          fi

          run_with_telegram "$ENABLE_TELEGRAM_TRACKER" strategy_tracker.py


          #python annual_NDX100_V1.py
          #python BTC_strategy.py

      # - name: Upload market cache
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: market-cache
      #     path: market_cache.pkl
      # python rubbeon_V3.py
      #python last_sar_break_V3.py
      #python allabove_V1.py
      # python annual_V1.py
      #python rubbeon_MTF_IMP.py
      #python rubbeon_MTF_IMP_V2.py
      #python sar_break_V3.py
      #python index_power1h.py
      #python fx_avg_all_V2.py
      #python index_power.py
      #python annual_V2.py
      #python sms_tim_V2.py
      #python minitrend.py
      # python sar_break_V6.py
      # python index_long_trend_V2.py
      # python signal_v8.py
      #python index_power.
      #python annual_V1.py
      #python signal_v7_28pairs.py --no-csv
      #TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python renko_lists_tracker.py --telegram

      #TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python break_line.py
      #TELEGRAM_BOT_TOKEN="" TELEGRAM_CHAT_ID="" python ichimoku_v4.
      #TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python renko_alignment_index_V4.py
      #TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python renko_ashi_alignment_29pairs.py --telegram
      #TELEGRAM_BOT_TOKEN="$TG_BOT_TOKEN" TELEGRAM_CHAT_ID="$TG_CHAT_ID" python renko_alignment_index.py

      - name: Commit and Push History
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          STATE_FILES="runner_history.json opportunity_stats.json trend_follower.json rubbeon_state.json rubbeon_MTF_IMP_state.json annual_v2_data.json annual_v2_state.json chg_cc_indices.json annual_ndx100_portfolio_state.json annual_ndx100_scan_state.json btc_dca_state.json signal_v7_exit_state.json break_line_state.json break_line_scan.json break_line_renko_state.json break_line_renko_scan.json renko_lists_tracker_state.json ichimoku_scan.json triple_g_consolidation.json heiken_ashi_scan.json strategy_tracker_state.json px_renko_index_scan.json px_renko_index_tracker_state.json"

          # ── Save state files to /tmp before any git operation ──
          for f in $STATE_FILES; do
            [ -f "$f" ] && cp "$f" "/tmp/ci_state_$(basename $f)" 2>/dev/null || true
          done

          # ── Abort any leftover rebase state from previous run ──
          if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
            echo "WARNING: rebase in progress, aborting..."
            git rebase --abort 2>/dev/null || true
          fi

          # ── Fetch + reset to latest remote (clean base) ──
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          # ── Restore our freshly-computed state files ──
          for f in $STATE_FILES; do
            [ -f "/tmp/ci_state_$(basename $f)" ] && cp "/tmp/ci_state_$(basename $f)" "$f" 2>/dev/null || true
          done

          # ── Stage and commit if anything changed ──
          PUSH_OK=0
          for attempt in 1 2 3; do
            git add --force $STATE_FILES 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No staged changes to commit"
              PUSH_OK=1
              break
            fi

            git commit -m "Update runner and stats history [skip ci]"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push OK on attempt $attempt"
              PUSH_OK=1
              break
            fi

            echo "WARNING: push failed on attempt $attempt, refreshing branch and retrying..."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            for f in $STATE_FILES; do
              [ -f "/tmp/ci_state_$(basename $f)" ] && cp "/tmp/ci_state_$(basename $f)" "$f" 2>/dev/null || true
            done
            sleep $((attempt * 5))
          done

          if [ "$PUSH_OK" -ne 1 ]; then
            echo "WARNING: all push attempts failed"
          fi
